# SpacemiT official VisionService config for spacemit_project.
# This file is board-oriented and is expected to run on Muse Pi Pro.

model_path: /mnt/ssd/models/vision/yolov8/yolov8n_no_dfl.q.onnx
test_image: ~/.cache/assets/image/006_test.jpg
label_file_path: /mnt/ssd/spacemit_project/third_party/model-zoo-vision/assets/labels/coco.txt
image_size: [640, 640]
class: deploy.yolov8.YOLOv8Detector

default_params:
  conf_threshold: 0.25
  iou_threshold: 0.45
  num_threads: 4
  providers:
    - SpaceMITExecutionProvider
