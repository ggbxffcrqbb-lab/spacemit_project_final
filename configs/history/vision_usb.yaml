project:
  name: spacemit_project
  root_dir: /mnt/ssd/spacemit_project
  models_dir: /mnt/ssd/models
  data_dir: /mnt/ssd/data
  cache_dir: /mnt/ssd/cache

logging:
  level: INFO
  dir: /mnt/ssd/logs/spacemit_project/vision_usb
  runtime_file: vision_runtime.log
  turns_file: vision_turns.jsonl

voice:
  playback_device: plughw:0,0
  playback_volume: 120%
  playback_sample_rate: 48000
  playback_channels: 2
  segment_max_chars: 28
  segment_min_chars: 10
  prewarm_llm: true
  prewarm_tts: true

  asr:
    model_dir: /mnt/ssd/models/asr/sensevoice-small
    prefer_optimized_model: true
    language: zh
    use_itn: true
    batch_size: 10
    intra_op_num_threads: 2

  llm:
    model: qwen2.5:0.5b
    api_url: http://127.0.0.1:11434/api/chat
    system_prompt: >
      你是运行在 Muse Pi Pro 板端的离线防腐专家助手，请始终使用中文回答。
    max_tokens: 56
    temperature: 0.0
    num_ctx: 1024
    keep_alive: 30m
    timeout: 300
    max_chars: 56
    min_chars: 10
    stop_after_first_sentence: true
    warmup_prompt: 请只回答“收到”。

  tts:
    matcha_root: /mnt/ssd/spacemit_project/third_party/model-zoo-tts
    model_dir: /mnt/ssd/models/tts/matcha-tts
    provider: cpu
    default_preset: matcha_zh
    mixed_preset: matcha_zh_en
    chinese_mode: quality
    speed: 1.0
    volume: 100
    threads: 4
    enable_warmup: true
    allow_cpu_fallback: true
    preload_mixed_engine: false
    warmup_text_zh: 你好。
    warmup_text_mixed: 今天学习 Python。
    keep_tts_wav: false
    trace_init: false

rag:
  enabled: true
  knowledge_dir: /mnt/ssd/spacemit_project/data/knowledge
  index_path: /mnt/ssd/spacemit_project/data/index/knowledge_index.json
  top_k: 3
  chunk_max_chars: 220
  min_score: 0.8
  max_context_chars: 900
  citation_limit: 2
  direct_answer_score: 2.0

ui:
  enabled: true
  status_dir: /mnt/ssd/logs/spacemit_project/ui
  html_file: status_page.html
  json_file: status_state.json
  text_file: status_screen.txt
  title: 板端防腐专家状态页
  refresh_seconds: 3
  history_limit: 6

vision:
  enabled: true
  backend: usb_v4l2
  output_dir: /mnt/ssd/logs/spacemit_project/vision_usb
  keep_capture_artifacts: false

  stream:
    performance_mode: false
    write_latest_capture: true
    write_slot_images: true
    generate_status_page: true

  mipi:
    detect_json_candidates:
      - /usr/share/camera_json/csi3_camera_detect.json
      - /usr/share/camera_json/csi1_camera_detect.json
      - /usr/share/camera_json/csi2_camera_detect.json
    auto_json_dir: /tmp
    capture_tmp_dir: /tmp
    capture_timeout_seconds: 45
    prefer_sensor: imx219_spm

  usb:
    device: /dev/video0
    auto_detect: true
    preferred_device_patterns:
      - icspring
      - usb
      - uvc
    width: 1280
    height: 720
    pixel_format: MJPG
    capture_timeout_seconds: 8

  recognizer:
    backend: spacemit_vision
    spacemit_vision_config: /mnt/ssd/spacemit_project/configs/vision_spacemit_yolov8.yaml
    spacemit_model_path: ""
    lazy_load: false
    save_annotated_image: true
    max_candidates: 3
