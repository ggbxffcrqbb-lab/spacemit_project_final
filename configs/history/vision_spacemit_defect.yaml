# Project-specific defect model config for future spacemit_vision deployment.
# This file is prepared in advance so the pipeline can switch from the fallback
# semantic mapping to direct defect classes once the custom model is trained.

model_path: /mnt/ssd/models/vision/defect/yolov8_defect.onnx
test_image: ~/.cache/assets/image/006_test.jpg
label_file_path: /mnt/ssd/spacemit_project/assets/labels/defect_detection.txt
image_size: [640, 640]
class: deploy.yolov8.YOLOv8Detector

default_params:
  conf_threshold: 0.25
  iou_threshold: 0.45
  num_threads: 4
  providers:
    - SpaceMITExecutionProvider
